services:
  api:
    build:
      context: .
      dockerfile: src/AuthDemo.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=authdemo;Username=authdemo;Password=${DB_PASSWORD:-changeme}
      - AllowedOrigins__0=http://localhost:3000
      - AllowedOrigins__1=https://${DOMAIN:-localhost}
      - ADMIN_KEY=${ADMIN_KEY:-super-admin-key-change-me}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://api:8080
    environment:
      - API_URL=http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=authdemo
      - POSTGRES_USER=authdemo
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authdemo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
